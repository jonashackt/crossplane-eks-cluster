apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  # Keep in mind that the apis dir is way up the folder hierachy relative to this TestStep!
  # Install the XRD
  - command: kubectl apply -f ../../../apis/eks/definition.yaml
  # Install the Function
  - command: kubectl apply -f ../../../crossplane-contrib/function-patch-and-transform/function.yaml
  # Install the Composition
  - command: kubectl apply -f ../../../apis/eks/composition.yaml
  # Wait for the Function to become healthy (needed for Composition Pipeline mode to render resources)
  - command: kubectl wait --for=condition=healthy --timeout=120s function/crossplane-contrib-function-patch-and-transform
  # Wait for XRD to become "established"
  - command: kubectl wait --for condition=established --timeout=20s xrd/eksclusters.eks.aws.crossplane.jonashackt.io
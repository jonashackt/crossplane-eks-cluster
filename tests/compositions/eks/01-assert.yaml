apiVersion: eks.aws.m.upbound.io/v1beta1
kind: Cluster
metadata:
  labels:
    crossplane.io/composite: deploy-target-eks
  namespace: default
spec:
  forProvider:
    region: eu-central-1
    roleArnSelector:
      matchControllerRef: true
      matchLabels:
        role: clusterRole
    vpcConfig:
      endpointPrivateAccess: true
      endpointPublicAccess: true
      securityGroupIds:
      - sg-0d9a3aa9e7f60b98c
      subnetIds:
      - subnet-06363785036b747f4
      - subnet-0e099a674b75ed055
      - subnet-03b17fc7aa1bf9fae
---
apiVersion: eks.aws.m.upbound.io/v1beta1
kind: ClusterAuth
metadata:
  labels:
    crossplane.io/composite: deploy-target-eks
  namespace: default
spec:
  forProvider:
    clusterNameSelector:
      matchControllerRef: true
    region: eu-central-1
---
apiVersion: eks.aws.m.upbound.io/v1beta1
kind: NodeGroup
metadata:
  labels:
    crossplane.io/composite: deploy-target-eks
  namespace: default
spec:
  forProvider:
    clusterNameSelector:
      matchControllerRef: true
    instanceTypes:
    - t3.medium
    nodeRoleArnSelector:
      matchControllerRef: true
      matchLabels:
        role: nodegroup
    region: eu-central-1
    scalingConfig:
      desiredSize: 3
      maxSize: 10
      minSize: 1
    subnetIdSelector:
      matchLabels:
        access: public
        net.aws.crossplane.jonashackt.io/network-id: deploy-target-eks



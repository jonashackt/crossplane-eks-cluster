apiVersion: k8s.crossplane.jonashackt.io/v1
kind: KubernetesCluster
metadata:
  name: deploy-target-eks
  namespace: default
---
apiVersion: net.aws.crossplane.jonashackt.io/v1
kind: Networking
metadata:
  annotations:
    crossplane.io/composition-resource-name: compositeNetworkEKS
  labels:
    crossplane.io/composite: deploy-target-eks
  namespace: default
  ownerReferences:
  - apiVersion: k8s.crossplane.jonashackt.io/v1
    blockOwnerDeletion: true
    controller: true
    kind: KubernetesCluster
    name: deploy-target-eks
spec:
  id: deploy-target-eks
  parameters:
    region: eu-central-1
---
apiVersion: eks.aws.crossplane.jonashackt.io/v1
kind: EKSCluster
metadata:
  labels:
    crossplane.io/composite: deploy-target-eks
  namespace: default
spec:
  id: deploy-target-eks
  parameters:
    region: eu-central-1
    nodes:
      count: 3
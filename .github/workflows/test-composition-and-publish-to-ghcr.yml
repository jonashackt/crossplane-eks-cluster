name: test-composition-and-publish-to-ghcr

on: [push]

env:
  GHCR_PAT: ${{ secrets.GHCR_PAT }}
  CONFIGURATION_VERSION: "v2.0.0"

jobs:
  resouces-rendering-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@master

      - name: Install kuttl & run Crossplane featured kuttl tests
        run: |
          echo "### Add homebrew to path as described in https://github.com/actions/runner-images/blob/main/images/linux/Ubuntu2004-Readme.md#notes"
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
        
          echo "### Install kuttl via brew"
          brew tap kudobuilder/tap
          brew install kuttl-cli

          echo "### Let's try to use kuttl"
          kubectl kuttl --version

          echo "### Run Crossplane featured kuttl tests"
          kubectl kuttl test
  
  build-configuration-and-publish-to-ghcr:
    needs: resouces-rendering-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

        # This currently gives an error: Failed to download Crossplane CLI. Please make sure version current exists on channel stable.
        # curl -sL "https://raw.githubusercontent.com/crossplane/crossplane/master/install.sh" |sh
        # So using manual download, see https://docs.crossplane.io/latest/cli/
        # and we also need to pick the bin named crank, since the crossplane bin is the Kubernetes Crossplane pod image.
        # Also using curl with --output crossplane to prevent error: Failed to create the file crossplane: Is a directory (since crossplane is a directory also)
      - name: Install Crossplane CLI
        run: |
          mkdir crossplane/cli
          cd crossplane/cli
          curl -sL "https://raw.githubusercontent.com/crossplane/crossplane/main/install.sh" |sh
          sudo mv crossplane /usr/local/bin/crossplane

      - name: Build Crossplane Configuration package & publish it to GitHub Container Registry
        run: |
          echo "### Build Configuration .xpkg file"
          crossplane xpkg build --package-root=. --examples-root="./examples" --ignore=".github/workflows/*,crossplane/install/*,crossplane/provider/*,kuttl-test.yaml,tests/compositions/eks/*,tests/compositions/networking/*,crossplane-contrib/*/*" --verbose

          echo "### Publish as OCI image to GHCR"
          crossplane xpkg push "ghcr.io/jonashackt/crossplane-eks-cluster:$CONFIGURATION_VERSION" --verbose
      
      
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: kubernetes-cluster
spec:
  compositeTypeRef:
    apiVersion: k8s.crossplane.jonashackt.io/v1alpha1
    kind: KubernetesCluster
  
  writeConnectionSecretsToNamespace: crossplane-system

  mode: Pipeline
  pipeline:
  - step: create-eks-networking-objects
    functionRef:
      name: crossplane-contrib-function-patch-and-transform
    input:
      apiVersion: pt.fn.crossplane.io/v1beta1
      kind: Resources
      resources:
      ### Nested use of Networking XR
      - name: compositeNetworkEKS
        base:
          apiVersion: net.aws.crossplane.jonashackt.io/v1
          kind: Networking
        patches:
          - fromFieldPath: spec.id
            toFieldPath: spec.id
          - fromFieldPath: spec.parameters.region
            toFieldPath: spec.parameters.region
          # provide the subnetIds & securityGroupClusterIds for later use
          - type: ToCompositeFieldPath
            fromFieldPath: status.subnetIds
            toFieldPath: status.subnetIds
            policy:
              fromFieldPath: Required
          - type: ToCompositeFieldPath
            fromFieldPath: status.securityGroupClusterIds
            toFieldPath: status.securityGroupClusterIds
            policy:
              fromFieldPath: Required
      
      ### Nested use of EKSCluster XR
      - name: compositeClusterEKS
        base:
          apiVersion: eks.aws.crossplane.jonashackt.io/v1
          kind: EKSCluster
        connectionDetails:
          - name: kubeconfig
            type: FromConnectionSecretKey
            fromConnectionSecretKey: kubeconfig
        patches:
          - fromFieldPath: spec.id
            toFieldPath: spec.id
          - fromFieldPath: spec.id
            toFieldPath: metadata.annotations[crossplane.io/external-name]
          - fromFieldPath: metadata.uid
            toFieldPath: spec.writeConnectionSecretToRef.name
            transforms:
              - type: string
                string:
                  type: Format
                  fmt: "%s-eks"
          - fromFieldPath: spec.writeConnectionSecretToRef.namespace
            toFieldPath: spec.writeConnectionSecretToRef.namespace
          - fromFieldPath: spec.parameters.region
            toFieldPath: spec.parameters.region
          - fromFieldPath: spec.parameters.nodes.count
            toFieldPath: spec.parameters.nodes.count
          - fromFieldPath: status.subnetIds
            toFieldPath: spec.parameters.subnetIds
            policy:
              fromFieldPath: Required
          - fromFieldPath: status.securityGroupClusterIds
            toFieldPath: spec.parameters.securityGroupClusterIds
            policy:
              fromFieldPath: Required
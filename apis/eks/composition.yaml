apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: aws-eks
  labels:
    provider: aws
spec:
  compositeTypeRef:
    # The XR's apiVersion must match this version here:
    apiVersion: eks.aws.crossplane.jonashackt.io/v1
    kind: EKSCluster

  mode: Pipeline
  pipeline:
  - step: create-eks-cluster-objects
    functionRef:
      name: crossplane-contrib-function-patch-and-transform
    input:
      apiVersion: pt.fn.crossplane.io/v1beta1
      kind: Resources
      resources:
      ### Cluster Configuration
      - name: eksCluster
        base:
          apiVersion: eks.aws.m.upbound.io/v1beta1
          kind: Cluster
          metadata:
            annotations:
              meta.upbound.io/example-id: eks/v1beta1/cluster
              uptest.upbound.io/timeout: "2400"
          spec:
            forProvider:
              roleArnSelector:
                matchControllerRef: true
                matchLabels:
                  role: clusterRole
              vpcConfig:
                endpointPrivateAccess: true
                endpointPublicAccess: true
        patches:
          - type: PatchSet
            patchSetName: clusterconfig
          - fromFieldPath: spec.id
            toFieldPath: metadata.name
          # Using the XNetworking defined securityGroupClusterIds & subnetIds for the vpcConfig
          - fromFieldPath: spec.parameters.securityGroupClusterIds
            toFieldPath: spec.forProvider.vpcConfig.securityGroupIds
          - fromFieldPath: spec.parameters.subnetIds
            toFieldPath: spec.forProvider.vpcConfig.subnetIds
          - type: ToCompositeFieldPath
            fromFieldPath: status.atProvider.status
            toFieldPath: status.clusterStatus    
        readinessChecks:
          - type: MatchString
            fieldPath: status.atProvider.status
            matchString: ACTIVE

      - name: kubernetesClusterAuth
        base:
          apiVersion: eks.aws.m.upbound.io/v1beta1
          kind: ClusterAuth
          spec:
            forProvider:
              clusterNameSelector:
                matchControllerRef: true
            # writeConnectionSecretToRef:
            #   namespace: crossplane-system
        connectionDetails:
          - name: kubeconfig
            type: FromConnectionSecretKey
            fromConnectionSecretKey: kubeconfig
        patches:
          - type: PatchSet
            patchSetName: clusterconfig
          - fromFieldPath: spec.id
            toFieldPath: spec.writeConnectionSecretToRef.name
            transforms:
              - type: string
                string:
                  type: Format
                  fmt: "%s-access"


      ### Cluster Role and Policies
      - name: clusterRole
        base:
          apiVersion: iam.aws.m.upbound.io/v1beta1
          kind: Role
          metadata:
            labels:
              role: clusterRole
          spec:
            forProvider:
              assumeRolePolicy: |
                {
                  "Version": "2012-10-17",
                  "Statement": [
                      {
                          "Effect": "Allow",
                          "Principal": {
                              "Service": [
                                  "eks.amazonaws.com"
                              ]
                          },
                          "Action": [
                              "sts:AssumeRole"
                          ]
                      }
                  ]
                }
        
      
      - name: clusterRolePolicyAttachment
        base:
          apiVersion: iam.aws.m.upbound.io/v1beta1
          kind: RolePolicyAttachment
          spec:
            forProvider:
              policyArn: arn:aws:iam::aws:policy/AmazonEKSClusterPolicy
              roleSelector:
                matchControllerRef: true
                matchLabels:
                  role: clusterRole


      ### NodeGroup Configuration
      - name: nodeGroupPublic
        base:
          apiVersion: eks.aws.m.upbound.io/v1beta1
          kind: NodeGroup
          spec:
            forProvider:
              clusterNameSelector:
                matchControllerRef: true
              nodeRoleArnSelector:
                matchControllerRef: true
                matchLabels:
                  role: nodegroup
              subnetIdSelector:
                matchLabels:
                  access: public
              scalingConfig:
                minSize: 1
                maxSize: 10
                desiredSize: 1
              instanceTypes: # TODO: we can support to have that parameterized also
                - t3.medium
        patches:
          - type: PatchSet
            patchSetName: clusterconfig
          - fromFieldPath: spec.parameters.nodes.count
            toFieldPath: spec.forProvider.scalingConfig.desiredSize
          - fromFieldPath: spec.id
            toFieldPath: spec.forProvider.subnetIdSelector.matchLabels[net.aws.crossplane.jonashackt.io/network-id]
          - type: ToCompositeFieldPath
            fromFieldPath: status.atProvider.status
            toFieldPath: status.nodePoolStatus  
        readinessChecks:
        - type: MatchString
          fieldPath: status.atProvider.status
          matchString: ACTIVE

      ### Node Role and Policies
      - name: nodegroupRole
        base:
          apiVersion: iam.aws.m.upbound.io/v1beta1
          kind: Role
          metadata:
            labels:
              role: nodegroup
          spec:
            forProvider:
              assumeRolePolicy: |
                {
                  "Version": "2012-10-17",
                  "Statement": [
                      {
                          "Effect": "Allow",
                          "Principal": {
                              "Service": [
                                  "ec2.amazonaws.com"
                              ]
                          },
                          "Action": [
                              "sts:AssumeRole"
                          ]
                      }
                  ]
                }
        

      - name: workerNodeRolePolicyAttachment
        base:
          apiVersion: iam.aws.m.upbound.io/v1beta1
          kind: RolePolicyAttachment
          spec:
            forProvider:
              policyArn: arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
              roleSelector:
                matchControllerRef: true
                matchLabels:
                  role: nodegroup
        

      - name: cniRolePolicyAttachment
        base:
          apiVersion: iam.aws.m.upbound.io/v1beta1
          kind: RolePolicyAttachment
          spec:
            forProvider:
              policyArn: arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
              roleSelector:
                matchControllerRef: true
                matchLabels:
                  role: nodegroup
        
      - name: containerRegistryRolePolicyAttachment
        base:
          apiVersion: iam.aws.m.upbound.io/v1beta1
          kind: RolePolicyAttachment
          spec:
            forProvider:
              policyArn: arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
              roleSelector:
                matchControllerRef: true
                matchLabels:
                  role: nodegroup
      

      patchSets:
      - name: clusterconfig
        patches:
        - fromFieldPath: spec.parameters.region
          toFieldPath: spec.forProvider.region    
apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: eksclusters.eks.aws.crossplane.jonashackt.io
spec:
  scope: Namespaced
  group: eks.aws.crossplane.jonashackt.io
  names:
    kind: EKSCluster
    plural: eksclusters
  defaultCompositionRef:
    name: aws-eks
  versions:
  - name: v1
    served: true
    referenceable: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          # defining input parameters
          spec:
            type: object
            properties:
              id:
                type: string
                description: ID of this Cluster that other objects will use to refer to it.
              parameters:
                type: object
                description: EKS configuration parameters.
                properties:
                  # Using subnetIds & securityGroupClusterIds from XNetworking to configure VPC
                  subnetIds:
                    type: array
                    items:
                      type: string
                  securityGroupClusterIds:
                    type: array
                    items:
                      type: string
                  region:
                    type: string
                  nodes:
                    type: object
                    description: EKS node configuration parameters.
                    properties:
                      count:
                        type: integer
                        description: Desired node count, from 1 to 10.
                    required:
                    - count
                required:
                - subnetIds
                - securityGroupClusterIds
                - region
                - nodes
              writeConnectionSecretToRef:
                type: object
                description: name of the connection secret
                properties:
                  name:
                    type: string
                  namespace:
                    type: string
            required:
            - id
            - parameters
          # defining return values
          status:
            type: object
            properties:
              clusterStatus:
                description: The status of the control plane
                type: string
              nodePoolStatus:
                description: The status of the node pool
                type: string
apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: kubernetesclusters.k8s.crossplane.jonashackt.io
spec:
  scope: Namespaced
  group: k8s.crossplane.jonashackt.io
  names:
    kind: KubernetesCluster
    plural: kubernetesclusters
  versions:
  - name: v1
    served: true
    referenceable: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          # defining input parameters
          spec:
            type: object
            properties:
              id:
                type: string
                description: ID of this Cluster that other objects will use to refer to it.
              parameters:
                type: object
                description: Cluster configuration parameters.
                properties:
                  region:
                    type: string
                  nodes:
                    type: object
                    description: Cluster node configuration parameters.
                    properties:
                      count:
                        type: integer
                        description: Desired node count, from 1 to 100.
                    required:
                    - count
                required:
                - region
                - nodes
              writeConnectionSecretToRef:
                type: object
                properties:
                  name:
                    type: string
                    description: Name of the Secret Crossplane will populate the EKSClusters kubeconfig to
            required:
            - id
            - parameters
          status:
            type: object
            properties:
              subnetIds:
                type: array
                items:
                  type: string
              securityGroupClusterIds:
                type: array
                items:
                  type: string